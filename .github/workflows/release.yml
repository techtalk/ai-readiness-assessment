# Cuts a GitHub Release whenever the plugin's version changes on main.
#
# The plugin version in .claude-plugin/plugin.json is the source of
# truth. When a PR that bumps it merges to main, this workflow tags the
# merge commit `v<version>` and publishes a Release whose notes are the
# matching `## [<version>]` section of CHANGELOG.md. It is idempotent —
# if a release for the current version already exists, it does nothing,
# so re-runs and unrelated edits to the manifest are safe.
#
# Keeping CHANGELOG.md current is enforced here: the workflow FAILS if
# there is no `## [<version>]` section for the version being released, so
# a version bump cannot ship without its changelog entry.
#
# Trigger it manually from the Actions tab (workflow_dispatch) to release
# the current version on demand — e.g. the first release, or after
# landing this workflow itself.
name: Release on version bump

on:
  push:
    branches: [main]
    paths:
      - ".claude-plugin/plugin.json"
      - ".claude-plugin/marketplace.json"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Cut a GitHub Release when the plugin version changes
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Read and validate the plugin version
        id: ver
        run: |
          set -euo pipefail
          plugin_ver=$(jq -r '.version' .claude-plugin/plugin.json)
          market_ver=$(jq -r '.plugins[] | select(.name=="ai-readiness-assessment") | .version' .claude-plugin/marketplace.json)
          if [ -z "$plugin_ver" ] || [ "$plugin_ver" = "null" ]; then
            echo "::error::No version found in .claude-plugin/plugin.json"; exit 1
          fi
          if [ "$plugin_ver" != "$market_ver" ]; then
            echo "::error::Version mismatch — plugin.json=$plugin_ver but marketplace.json=$market_ver. Keep them in lockstep."; exit 1
          fi
          echo "version=$plugin_ver" >> "$GITHUB_OUTPUT"
          echo "tag=v$plugin_ver" >> "$GITHUB_OUTPUT"
          echo "Plugin version: $plugin_ver"

      - name: Extract release notes from CHANGELOG.md
        run: |
          set -euo pipefail
          ver="${{ steps.ver.outputs.version }}"
          if [ ! -f CHANGELOG.md ]; then
            echo "::error::CHANGELOG.md not found."; exit 1
          fi
          # Capture the body of the "## [<ver>]" section, stopping at the next
          # "## [" heading or the link-reference block at the foot of the file.
          awk -v ver="$ver" '
            $0 ~ ("^## \\[" ver "\\]") { flag=1; next }
            flag && (/^## \[/ || /^\[[^]]+\]: /) { exit }
            flag { print }
          ' CHANGELOG.md > release-notes.md
          if ! grep -q '[^[:space:]]' release-notes.md; then
            echo "::error::No CHANGELOG.md entry for $ver. Add a '## [$ver]' section before releasing."; exit 1
          fi
          echo "Release notes for v$ver:"; echo "----"; cat release-notes.md

      - name: Create the release if it does not already exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ steps.ver.outputs.tag }}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $tag already exists — nothing to do."
            exit 0
          fi
          gh release create "$tag" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "$tag" \
            --notes-file release-notes.md
          echo "Created release $tag at $GITHUB_SHA"
