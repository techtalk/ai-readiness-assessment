name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  spec-first-ordering:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/check-spec-first.sh

  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest

  fitness-functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -e ".[dev]"
      - name: Layer boundary
        run: ./scripts/fitness/layer-boundary.sh
      - name: Complexity hotspots
        run: ./scripts/fitness/complexity.sh
      - name: Dependency age budget
        run: ./scripts/fitness/dependency-age.sh
