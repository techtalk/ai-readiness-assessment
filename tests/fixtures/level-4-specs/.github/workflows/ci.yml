name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  spec-first-ordering:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify spec exists before implementation
        run: |
          # For every PR that touches src/, require at least one spec
          # file under specs/ to be referenced in the PR body or
          # touched in the same PR.
          ./scripts/check-spec-first.sh

  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest
