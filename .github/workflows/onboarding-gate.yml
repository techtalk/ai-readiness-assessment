# PR-time gate: keep ONBOARDING.md in step with its sources.
#
# ONBOARDING.md is generated by /harness-onboarding from the HARNESS.md
# body (Context / Conventions / Constraints / Garbage Collection),
# AGENTS.md, and REFLECTION_LOG.md. If a PR changes the HARNESS *body* or
# AGENTS.md without refreshing ONBOARDING.md, this check fails — so a
# harness change can't merge while the onboarding guide silently trails
# it. Run /harness-onboarding and include the regenerated file.
#
# Deliberately scoped so it does NOT fire on:
#   - HARNESS.md Status-block-only edits (the body is compared, not the
#     whole file), so /harness-sync PRs pass;
#   - convention-file syncs (.cursor / .windsurf / copilot), which aren't
#     onboarding sources.
name: Onboarding gate

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gate:
    name: Onboarding gate
    runs-on: ubuntu-latest
    steps:
      - name: Check out the PR (full history for base comparison)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require an ONBOARDING refresh when its sources change
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail

          # HARNESS body = everything above the Status-block marker.
          git show "$BASE_SHA:HARNESS.md" > /tmp/harness_base.md 2>/dev/null || : > /tmp/harness_base.md
          base_body=$(awk '/Auto-updated by/{exit} {print}' /tmp/harness_base.md)
          head_body=$(awk '/Auto-updated by/{exit} {print}' HARNESS.md)
          harness_body_changed=no; [ "$base_body" != "$head_body" ] && harness_body_changed=yes

          agents_changed=no
          if ! git diff --quiet "$BASE_SHA" HEAD -- AGENTS.md; then agents_changed=yes; fi

          onboarding_changed=no
          if ! git diff --quiet "$BASE_SHA" HEAD -- ONBOARDING.md; then onboarding_changed=yes; fi

          echo "harness_body_changed=$harness_body_changed · agents_changed=$agents_changed · onboarding_changed=$onboarding_changed"

          if { [ "$harness_body_changed" = yes ] || [ "$agents_changed" = yes ]; } && [ "$onboarding_changed" = no ]; then
            echo "::error::ONBOARDING.md is stale. This PR changes the HARNESS body or AGENTS.md but does not refresh ONBOARDING.md. Run /harness-onboarding and include the regenerated file. (HARNESS Status-block-only edits and convention-file syncs do not trigger this gate.)"
            exit 1
          fi
          echo "Onboarding is in step with its sources."
