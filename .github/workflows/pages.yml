# Builds the MkDocs documentation site and deploys it to GitHub Pages.
# Source: the docs/ directory + mkdocs.yml. Runs on push to main that
# touches the docs, and on demand via workflow_dispatch.
#
# Pages must be configured to build from GitHub Actions (Settings →
# Pages → Source: GitHub Actions) for the deploy step to publish.
name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "requirements.txt"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install MkDocs and the Material theme
        run: pip install --requirement requirements.txt

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build the site
        run: mkdocs build --strict --site-dir _site

      - name: Upload the site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
